name: Bug report
description: Report a bug or unexpected behavior
title: "[Bug] "
labels: ["bug", "feedback"]
body:
  - type: textarea
    id: what
    attributes:
      label: What happened?
      description: Describe the bug. Include steps to reproduce, expected vs. actual behavior.
    validations:
      required: true
  - type: textarea
    id: diagnostics
    attributes:
      label: Diagnostics
      description: App version / OS / mode / theme — auto-filled when submitted from inside WordMD.
